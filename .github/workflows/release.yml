name: OTA Release Pipeline

on:
  workflow_dispatch:

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    # Job level par 3 ghante ka timeout
    timeout-minutes: 180

    steps:
      - name: Checkout OTA Repo
        uses: actions/checkout@v4

      - name: SSH into GCP & Build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: mist
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            bash /home/mist/release.sh

      - name: Fetch OTA JSON from GCP
        run: |
         echo "${{ secrets.GCP_SSH_KEY }}" > private_key
         chmod 600 private_key
         scp -i private_key -o StrictHostKeyChecking=no mist@${{ secrets.GCP_HOST }}:/home/mist/warm.json ./warm.json


      - name: Update GitHub Pages OTA
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "OTA Release Bot"
          git add warm.json
          git commit -m "Update OTA JSON for $(date +%Y%m%d)" || echo "No changes to commit"
          git push origin main
